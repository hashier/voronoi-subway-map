<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Contrast Voronoi Subway Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body,
        html {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1000;
        }

        #spinner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.2);
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #spinner.visible {
            display: block;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        #error-banner {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1002;
            background: #d32f2f;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            font: 13px/1.5 sans-serif;
            max-width: 80%;
            text-align: center;
        }

        #error-banner.visible {
            display: block;
        }

        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1001;
            background: white;
            padding: 10px 14px;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
            font: 13px/1.5 sans-serif;
        }

        #controls label {
            display: block;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <canvas id="canvas"></canvas>
    <div id="spinner"></div>
    <div id="controls"></div>
    <div id="error-banner"></div>
    <script type="module">

        import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

        // Only for debugging
        const skipVoronoi = false

        // Query modes
        const bbox = (b) => `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        const QUERY_MODES = {
            'subway-nodes': {
                label: 'Subway (nodes only)',
                buildQuery: (b) => `[out:json];node["station"="subway"](${bbox(b)});out body;`,
            },
            'subway-all': {
                label: 'Subway (all geometries)',
                buildQuery: (b) => `[out:json];nwr["station"="subway"](${bbox(b)});out body center;`,
            },
            'subway-broad': {
                label: 'Subway (broad match)',
                buildQuery: (b) => `[out:json];(nwr["station"="subway"](${bbox(b)});nwr["railway"="station"]["subway"="yes"](${bbox(b)}););out body center;`,
            },
            'all-rail': {
                label: 'All rail transit',
                buildQuery: (b) => `[out:json];(nwr["station"="subway"](${bbox(b)});nwr["railway"="station"]["subway"="yes"](${bbox(b)});nwr["station"~"light_rail|monorail"](${bbox(b)});nwr["railway"~"tram_stop|halt"](${bbox(b)}););out body center;`,
            },
            'buses': {
                label: 'Buses',
                buildQuery: (b) => `[out:json];(nwr["highway"="bus_stop"](${bbox(b)});nwr["amenity"="bus_station"](${bbox(b)}););out body center;`,
            },
        };

        // URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let lat = urlParams.get('lat') || 59.92;
        let lng = urlParams.get('long') || 10.75;
        let z = urlParams.get('z') || 14;
        let currentMode = urlParams.get('mode') || 'subway-all';
        if (!QUERY_MODES[currentMode]) currentMode = 'subway-all';

        // Build radio buttons
        const controls = document.getElementById('controls');
        for (const [key, mode] of Object.entries(QUERY_MODES)) {
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'queryMode';
            radio.value = key;
            radio.checked = key === currentMode;
            radio.addEventListener('change', () => {
                currentMode = key;
                cachedBounds = null;
                cachedStops = null;
                debouncedMoveEnd();
            });
            label.appendChild(radio);
            label.append(' ' + mode.label);
            controls.appendChild(label);
        }

        // Map
        const map = L.map('map', {
            attributionControl: false
        }).setView([lat, lng], z);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap contributors</a>'
        }).addTo(map);
        L.control.attribution()
            .addAttribution('<a href="https://github.com/hashier/voronoi-subway-map/">Webpage source code</a>')
            .addTo(map);
        const markerLayer = L.layerGroup().addTo(map);

        // Canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // Code
        let debounceTimeout = null;
        function debouncedMoveEnd() {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(moveEnd, 500);
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            debouncedMoveEnd();
        }
        window.addEventListener('resize', resizeCanvas);

        let cachedBounds = null;
        let cachedStops = null;
        let abortController = null;
        const errorBanner = document.getElementById('error-banner');
        let errorTimeout = null;

        function showError(msg) {
            clearTimeout(errorTimeout);
            errorBanner.textContent = msg;
            errorBanner.classList.add('visible');
            errorTimeout = setTimeout(() => errorBanner.classList.remove('visible'), 8000);
        }

        function expandBounds(bounds, factor) {
            const latPad = (bounds.getNorth() - bounds.getSouth()) * (factor - 1) / 2;
            const lngPad = (bounds.getEast() - bounds.getWest()) * (factor - 1) / 2;
            return L.latLngBounds(
                [bounds.getSouth() - latPad, bounds.getWest() - lngPad],
                [bounds.getNorth() + latPad, bounds.getEast() + lngPad]
            );
        }

        async function fetchSubwayStops() {
            const bounds = map.getBounds();

            console.log("Current bounds:", bounds.toBBoxString());
            console.log("Cached bounds:", cachedBounds ? cachedBounds.toBBoxString() : "none");

            if (cachedBounds && cachedBounds.contains(bounds)) {
                console.log("Using cached stops");
                return cachedStops;
            }

            const fetchBounds = expandBounds(bounds, 1.5);
            console.log("Fetching with expanded bounds:", fetchBounds.toBBoxString());
            const query = QUERY_MODES[currentMode].buildQuery(fetchBounds);
            console.log("Query mode:", currentMode);
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
            if (abortController) {
                console.log("Aborting previous fetch");
                abortController.abort();
            }
            abortController = new AbortController();
            try {
                console.log("Fetching subway stops…");
                const response = await fetch(url, { signal: abortController.signal });
                if (!response.ok) {
                    const msg = response.status === 429
                        ? `Overpass API rate limit hit (429). Try again in a few seconds.`
                        : response.status === 504
                        ? `Overpass API timeout (504). The query may be too broad — try a smaller area or simpler mode.`
                        : `Overpass API error: ${response.status} ${response.statusText}`;
                    console.error(msg);
                    showError(msg);
                    return [];
                }
                const data = await response.json();
                console.log(`Fetching done — ${data.elements.length} elements`);
                cachedBounds = fetchBounds;
                cachedStops = data.elements.map(el => ({
                    lat: el.lat ?? el.center?.lat,
                    lon: el.lon ?? el.center?.lon,
                    tags: el.tags,
                })).filter(el => el.lat != null && el.lon != null);
                return cachedStops;
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log("Fetch aborted");
                    return [];
                }
                console.error('Error fetching subway stops:', error);
                showError(`Network error: ${error.message}`);
                return [];
            }
        }

        function generateColors() {
            // return ['#e6194b', '#3cb44b', '#ffe119', '#4363d8']; // Red, Green, Yellow, Blue
            return d3.schemeCategory10;
        }
        function generate_n_Colors(n = 7) {
            let colors = [];
            const hueStep = 360 / n;
            for (let i = 0; i < n; i++) {
                colors.push(`hsl(${i * hueStep}, 80%, 50%)`);
            }
            return colors.sort(() => Math.random() - 0.5);
        }

        function assignColors(stops, delaunay) {
            const colors = generateColors();
            const assignedColors = new Array(stops.length).fill(null);

            for (let i = 0; i < stops.length; i++) {
                const neighbors = delaunay.neighbors(i);
                const usedColors = new Set();

                for (const neighbor of neighbors) {
                    if (assignedColors[neighbor] !== null) {
                        usedColors.add(assignedColors[neighbor]);
                    }
                }

                for (const color of colors) {
                    if (!usedColors.has(color)) {
                        assignedColors[i] = color;
                        break;
                    }
                }

                // Ensure that a color has been assigned
                if (assignedColors[i] === null) {
                    console.error(`Failed to assign color to stop ${i}`);
                }
            }

            return assignedColors;
        }

        function updateURL() {
            ({ lat, lng } = map.getCenter());
            const z = map.getZoom();

            const url = new URL(location.href);
            url.searchParams.set('lat', lat.toFixed(4));
            url.searchParams.set('long', lng.toFixed(4));
            url.searchParams.set('z', z);
            url.searchParams.set('mode', currentMode);

            history.replaceState(history.state, 'unused', url.href);
        }

        const spinner = document.getElementById('spinner');

        async function drawVoronoi() {
            if (skipVoronoi) {
                return;
            }
            console.log("Drawing Voronoi…");
            ctx.clearRect(0, 0, width, height);

            spinner.classList.add('visible');
            const rawStops = await fetchSubwayStops();
            spinner.classList.remove('visible');
            if (rawStops.length === 0) return;

            const stops = rawStops.map((stop, index) => {
                const point = map.latLngToContainerPoint([stop.lat, stop.lon]);
                return { x: point.x, y: point.y };
            });

            const delaunay = new d3.Delaunay(stops.map(s => [s.x, s.y]).flat(Infinity));
            const colors = assignColors(stops, delaunay);

            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;

            console.log("Coloring canvas…");
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const index = (y * width + x) * 4;
                    const stopIndex = delaunay.find(x, y);
                    const color = d3.color(colors[stopIndex]);

                    if (color) {
                        const colorRgb = color.rgb();
                        data[index] = colorRgb.r;
                        data[index + 1] = colorRgb.g;
                        data[index + 2] = colorRgb.b;
                        data[index + 3] = 125; // Adjust alpha for better visibility
                    } else {
                        console.error(`Color assignment failed for stop index ${stopIndex}`);
                    }
                }
            }
            console.log("Coloring done");

            ctx.putImageData(imageData, 0, 0);

            markerLayer.clearLayers();
            for (let i = 0; i < rawStops.length; i++) {
                const stop = rawStops[i];
                L.circleMarker([stop.lat, stop.lon], {
                    radius: 6,
                    fillColor: colors[i],
                    color: 'white',
                    weight: 1,
                    fillOpacity: 1,
                }).bindTooltip(stop.tags?.name || 'Unknown station')
                  .addTo(markerLayer);
            }
            console.log("Drawing Voronoi done");
        }

        // Map moved
        function moveEnd() {
            updateURL();
            drawVoronoi();
        }
        map.on('moveend', debouncedMoveEnd);

        drawVoronoi();
    </script>
</body>

</html>
