<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voronoi Subway Map</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body,
        html {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1000;
        }

        #spinner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.2);
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #spinner.visible {
            display: block;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        #error-banner {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1002;
            background: #d32f2f;
            color: white;
            padding: 14px 28px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            font: 16px/1.5 sans-serif;
            max-width: 80%;
            text-align: center;
        }

        #error-banner.visible {
            display: block;
        }

        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1001;
            background: rgba(0, 0, 0, 0.7);
            color: #ccc;
            padding: 8px 12px;
            border-radius: 4px;
            font: 12px/1.6 sans-serif;
        }

        #controls label {
            display: block;
            cursor: pointer;
        }

        #controls button {
            display: block;
            margin-top: 6px;
            padding: 3px 8px;
            font: 12px sans-serif;
            cursor: pointer;
            border: 1px solid #555;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.15);
            color: #ccc;
            width: 100%;
        }

        #controls button:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        #controls hr {
            border: none;
            border-top: 1px solid #555;
            margin: 6px 0;
        }

        #stats {
            position: absolute;
            bottom: 30px;
            right: 10px;
            z-index: 1001;
            background: rgba(0, 0, 0, 0.7);
            color: #ccc;
            padding: 6px 10px;
            border-radius: 4px;
            font: 11px/1.5 monospace;
            white-space: pre;
            pointer-events: none;
        }

        #stats-toggle {
            display: none;
            position: absolute;
            bottom: 30px;
            right: 10px;
            z-index: 1002;
            background: rgba(0, 0, 0, 0.6);
            color: #ccc;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font: 11px/1.3 monospace;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            #stats { display: none; }
            #stats-toggle { display: block; }
            #stats.visible { display: block; bottom: 50px; }
        }

        #station-label {
            display: none;
            position: absolute;
            z-index: 1001;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font: 12px/1.3 sans-serif;
            white-space: nowrap;
        }

        #github-link {
            position: absolute;
            bottom: 6px;
            left: 6px;
            z-index: 1001;
            opacity: 0.8;
        }

        #github-link:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <a id="github-link" href="https://github.com/hashier/voronoi-subway-map/" target="_blank" aria-label="View source on GitHub">
        <svg width="32" height="32" viewBox="0 0 16 16" fill="#333"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <canvas id="canvas"></canvas>
    <div id="spinner"></div>
    <div id="controls"></div>
    <div id="error-banner"></div>
    <div id="station-label"></div>
    <div id="stats"></div>
    <button id="stats-toggle">stats</button>
    <script type="module">

        import { Delaunay } from "https://cdn.jsdelivr.net/npm/d3-delaunay@6/+esm";
        import { schemeCategory10 } from "https://cdn.jsdelivr.net/npm/d3-scale-chromatic@3/+esm";

        // Only for debugging
        const skipVoronoi = false

        // Query modes
        const bbox = (b) => `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        const QUERY_MODES = {
            'subway-nodes': {
                label: 'Subway (nodes only)',
                static: true,
                dataUrl: 'data/subway-nodes.json',
            },
            'subway-all': {
                label: 'Subway (all geometries)',
                static: true,
                dataUrl: 'data/subway-all.json',
            },
            'subway-broad': {
                label: 'Subway (broad match)',
                static: true,
                dataUrl: 'data/subway-broad.json',
            },
            'all-rail': {
                label: 'All rail transit',
                static: true,
                dataUrl: 'data/all-rail.json',
            },
            'airports': {
                label: 'Airports',
                static: true,
                dataUrl: 'data/airports.json',
            },
            'buses': {
                label: 'Buses',
                buildQuery: (b) => `[out:json];(nwr["highway"="bus_stop"](${bbox(b)});nwr["amenity"="bus_station"](${bbox(b)}););out body center;`,
            },
        };

        // URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let lat = urlParams.get('lat') || 59.92;
        let lng = urlParams.get('long') || 10.75;
        let z = urlParams.get('z') || 14;
        let currentMode = urlParams.get('mode') || 'subway-all';
        if (!QUERY_MODES[currentMode]) currentMode = 'subway-all';

        // Build radio buttons
        const controls = document.getElementById('controls');
        for (const [key, mode] of Object.entries(QUERY_MODES)) {
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'queryMode';
            radio.value = key;
            radio.checked = key === currentMode;
            radio.addEventListener('change', () => {
                currentMode = key;
                debouncedMoveEnd();
            });
            label.appendChild(radio);
            label.append(' ' + mode.label);
            controls.appendChild(label);
        }

        controls.appendChild(document.createElement('hr'));

        let showBorders = true;
        const bordersLabel = document.createElement('label');
        const bordersCheckbox = document.createElement('input');
        bordersCheckbox.type = 'checkbox';
        bordersCheckbox.checked = showBorders;
        bordersCheckbox.addEventListener('change', () => {
            showBorders = bordersCheckbox.checked;
            debouncedMoveEnd();
        });
        bordersLabel.appendChild(bordersCheckbox);
        bordersLabel.append(' Cell borders');
        controls.appendChild(bordersLabel);

        // Map
        const map = L.map('map').setView([lat, lng], z);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
        let markerLayer = L.layerGroup().addTo(map);
        function resetMarkers() {
            map.removeLayer(markerLayer);
            markerLayer = L.layerGroup().addTo(map);
        }

        // Canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // Code
        let debounceTimeout = null;
        let debounceStart = null;
        function debouncedMoveEnd() {
            clearTimeout(debounceTimeout);
            debounceStart = performance.now();
            const delay = QUERY_MODES[currentMode].static ? 100 : 500;
            debounceTimeout = setTimeout(moveEnd, delay);
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            debouncedMoveEnd();
        }
        window.addEventListener('resize', resizeCanvas);

        const cache = {};
        let abortController = null;
        const errorBanner = document.getElementById('error-banner');
        let errorTimeout = null;

        function showBanner(msg, { color = '#d32f2f', duration = 8000 } = {}) {
            clearTimeout(errorTimeout);
            errorBanner.textContent = msg;
            errorBanner.style.background = color;
            errorBanner.classList.add('visible');
            errorTimeout = setTimeout(() => errorBanner.classList.remove('visible'), duration);
        }

        function expandBounds(bounds, factor) {
            const latPad = (bounds.getNorth() - bounds.getSouth()) * (factor - 1) / 2;
            const lngPad = (bounds.getEast() - bounds.getWest()) * (factor - 1) / 2;
            return L.latLngBounds(
                [bounds.getSouth() - latPad, bounds.getWest() - lngPad],
                [bounds.getNorth() + latPad, bounds.getEast() + lngPad]
            );
        }

        async function fetchStaticStops() {
            const mode = QUERY_MODES[currentMode];
            if (cache[currentMode]) {
                console.log("Using cached static stops");
                return cache[currentMode].stops;
            }
            console.log(`Loading static data from ${mode.dataUrl}…`);
            try {
                const response = await fetch(mode.dataUrl);
                if (!response.ok) {
                    showBanner(`Failed to load static data: ${response.status}`);
                    return null;
                }
                const stops = await response.json();
                console.log(`Loaded ${stops.length} stations from static file`);
                cache[currentMode] = { stops };
                return stops;
            } catch (error) {
                console.error('Error loading static data:', error);
                showBanner(`Error loading static data: ${error.message}`);
                return null;
            }
        }

        async function fetchOverpassStops() {
            const bounds = map.getBounds();

            const modeCache = cache[currentMode];
            console.log("Current bounds:", bounds.toBBoxString());
            console.log("Cached bounds:", modeCache ? modeCache.bounds.toBBoxString() : "none");

            if (modeCache && modeCache.bounds.contains(bounds)) {
                console.log("Using cached stops");
                return modeCache.stops;
            }

            const fetchBounds = expandBounds(bounds, 1.5);
            console.log("Fetching with expanded bounds:", fetchBounds.toBBoxString());
            const query = QUERY_MODES[currentMode].buildQuery(fetchBounds);
            console.log("Query mode:", currentMode);
            const encodedQuery = encodeURIComponent(query);
            const url = `https://overpass-api.de/api/interpreter?data=${encodedQuery}`;
            if (abortController) {
                console.log("Aborting previous fetch");
                abortController.abort();
            }
            abortController = new AbortController();

            const maxRetries = 3;
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    console.log(`Fetching stops… (attempt ${attempt}/${maxRetries})`);
                    const response = await fetch(url, { signal: abortController.signal });
                    if (!response.ok) {
                        const msg = response.status === 429
                            ? `Rate limit hit — slow down a bit and try again.`
                            : response.status === 504
                            ? `504 Gateway Timeout`
                            : `Overpass API error: ${response.status} ${response.statusText}`;
                        if (attempt < maxRetries) {
                            const delay = [3000, 5000, 10000][attempt - 1];
                            console.warn(`${msg} — retrying in ${delay}ms…`);
                            await new Promise(r => setTimeout(r, delay));
                            continue;
                        }
                        console.error(msg);
                        showBanner(msg);
                        return null;
                    }
                    const data = await response.json();
                    console.log(`Fetching done — ${data.elements.length} elements`);
                    const stops = data.elements.map(el => ({
                        lat: el.lat ?? el.center?.lat,
                        lon: el.lon ?? el.center?.lon,
                        tags: el.tags,
                    })).filter(el => el.lat != null && el.lon != null);
                    cache[currentMode] = { bounds: fetchBounds, stops };
                    return stops;
                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.log("Fetch aborted");
                        return null;
                    }
                    if (attempt < maxRetries) {
                        const delay = [3000, 5000, 10000][attempt - 1];
                        console.warn(`Network error: ${error.message} — retrying in ${delay}ms…`);
                        await new Promise(r => setTimeout(r, delay));
                        continue;
                    }
                    console.error('Error fetching stops:', error);
                    showBanner(`Network error: ${error.message}`);
                    return null;
                }
            }
        }

        async function fetchSubwayStops() {
            return QUERY_MODES[currentMode].static
                ? fetchStaticStops()
                : fetchOverpassStops();
        }

        function generateColors() {
            // return ['#e6194b', '#3cb44b', '#ffe119', '#4363d8']; // Red, Green, Yellow, Blue
            return schemeCategory10;
        }
        function generate_n_Colors(n = 7) {
            let colors = [];
            const hueStep = 360 / n;
            for (let i = 0; i < n; i++) {
                colors.push(`hsl(${i * hueStep}, 80%, 50%)`);
            }
            return colors.sort(() => Math.random() - 0.5);
        }

        function assignColors(stops, delaunay) {
            const colors = generateColors();
            const assignedColors = new Array(stops.length).fill(null);

            for (let i = 0; i < stops.length; i++) {
                const neighbors = delaunay.neighbors(i);
                const usedColors = new Set();

                for (const neighbor of neighbors) {
                    if (assignedColors[neighbor] !== null) {
                        usedColors.add(assignedColors[neighbor]);
                    }
                }

                for (const color of colors) {
                    if (!usedColors.has(color)) {
                        assignedColors[i] = color;
                        break;
                    }
                }

                // Ensure that a color has been assigned
                if (assignedColors[i] === null) {
                    console.error(`Failed to assign color to stop ${i}`);
                }
            }

            return assignedColors;
        }

        function updateURL() {
            ({ lat, lng } = map.getCenter());
            const z = map.getZoom();

            const url = new URL(location.href);
            url.searchParams.set('lat', lat.toFixed(4));
            url.searchParams.set('long', lng.toFixed(4));
            url.searchParams.set('z', z);
            url.searchParams.set('mode', currentMode);

            history.replaceState(history.state, 'unused', url.href);
        }

        const spinner = document.getElementById('spinner');
        const stationLabel = document.getElementById('station-label');
        let canvasRefLatLng = null;
        let canvasRefPoint = null;
        let currentDelaunay = null;
        let currentRawStops = null;

        map.getContainer().addEventListener('mousemove', (e) => {
            if (!currentDelaunay || !currentRawStops || !canvasRefLatLng) {
                stationLabel.style.display = 'none';
                return;
            }
            // Adjust mouse position for canvas pan offset
            const pt = map.latLngToContainerPoint(canvasRefLatLng);
            const dx = pt.x - canvasRefPoint.x;
            const dy = pt.y - canvasRefPoint.y;
            const index = currentDelaunay.find(e.clientX - dx, e.clientY - dy);
            const stop = currentRawStops[index];
            const name = stop?.name || stop?.tags?.name;
            if (!name) {
                stationLabel.style.display = 'none';
                return;
            }
            stationLabel.textContent = name;
            stationLabel.style.display = 'block';
            stationLabel.style.left = (e.clientX + 12) + 'px';
            stationLabel.style.top = (e.clientY - 8) + 'px';
        });

        map.getContainer().addEventListener('mouseleave', () => {
            stationLabel.style.display = 'none';
        });

        map.on('move', () => {
            if (canvasRefLatLng) {
                const pt = map.latLngToContainerPoint(canvasRefLatLng);
                canvas.style.transform = `translate(${pt.x - canvasRefPoint.x}px, ${pt.y - canvasRefPoint.y}px)`;
            }
        });

        const statsEl = document.getElementById('stats');
        const statsToggle = document.getElementById('stats-toggle');
        statsToggle.addEventListener('click', () => statsEl.classList.toggle('visible'));

        const stats = {};
        let stationCount = 0;
        let visibleCount = 0;
        function updateStats(phase, ms) {
            stats[phase] = ms;
            const fmt = (k) => stats[k] != null ? `${stats[k].toFixed(0)}ms` : '…';
            const lines = [
                `visible:  ${visibleCount.toLocaleString()}/${stationCount.toLocaleString()}`,
                `canvas:   ${width}×${height}`,
                `fetch:    ${fmt('fetch')}`,
                `project:  ${fmt('project')}`,
                `delaunay: ${fmt('delaunay')}`,
                `colors:   ${fmt('colors')}`,
                `voronoi:  ${fmt('voronoi')}`,
                `fill:     ${fmt('fill')}`,
                `borders:  ${fmt('borders')}`,
                `markers:  ${fmt('markers')}`,
                `paint:    ${fmt('paint')}`,
                `total:    ${fmt('total')}`,
                `debounce: ${fmt('debounce')}`,
                `perceived:${fmt('perceived')}`,
            ];
            statsEl.textContent = lines.join('\n');
        }

        function timePhase(name, fn) {
            const start = performance.now();
            const result = fn();
            updateStats(name, performance.now() - start);
            return result;
        }

        async function drawVoronoi() {
            if (skipVoronoi) {
                return;
            }
            const totalStart = performance.now();
            const debounceMs = debounceStart ? totalStart - debounceStart : null;

            canvas.style.transform = '';
            ctx.clearRect(0, 0, width, height);
            currentDelaunay = null;
            currentRawStops = null;
            for (const k of Object.keys(stats)) delete stats[k];
            stationCount = 0;
            if (debounceMs) updateStats('debounce', debounceMs);
            updateStats('fetch', null);

            spinner.classList.add('visible');
            const fetchStart = performance.now();
            const rawStops = await fetchSubwayStops();
            stationCount = rawStops?.length || 0;
            updateStats('fetch', performance.now() - fetchStart);
            spinner.classList.remove('visible');
            if (rawStops === null) {
                resetMarkers();
                return;
            }
            if (rawStops.length === 0) {
                resetMarkers();
                showBanner('No stations found in this area. Try zooming out or switching query mode.', { color: '#555' });
                return;
            }
            const stops = timePhase('project', () =>
                rawStops.map((stop) => {
                    const point = map.latLngToContainerPoint([stop.lat, stop.lon]);
                    return { x: point.x, y: point.y };
                })
            );

            visibleCount = stops.filter(s => s.x >= 0 && s.x <= width && s.y >= 0 && s.y <= height).length;

            const delaunay = timePhase('delaunay', () =>
                new Delaunay(stops.map(s => [s.x, s.y]).flat(Infinity))
            );
            currentDelaunay = delaunay;
            currentRawStops = rawStops;

            const colors = timePhase('colors', () =>
                assignColors(stops, delaunay)
            );

            const voronoi = timePhase('voronoi', () =>
                delaunay.voronoi([0, 0, width, height])
            );

            timePhase('fill', () => {
                ctx.globalAlpha = 125 / 255;
                for (let i = 0; i < stops.length; i++) {
                    const cell = voronoi.cellPolygon(i);
                    if (!cell) continue;
                    ctx.beginPath();
                    ctx.moveTo(cell[0][0], cell[0][1]);
                    for (let j = 1; j < cell.length; j++) {
                        ctx.lineTo(cell[j][0], cell[j][1]);
                    }
                    ctx.closePath();
                    ctx.fillStyle = colors[i];
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            });

            if (showBorders) {
                timePhase('borders', () => {
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    voronoi.render(ctx);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                });
            }

            timePhase('markers', () => {
                resetMarkers();
                for (let i = 0; i < rawStops.length; i++) {
                    const stop = rawStops[i];
                    L.circleMarker([stop.lat, stop.lon], {
                        radius: 6,
                        fillColor: colors[i],
                        color: 'white',
                        weight: 1,
                        fillOpacity: 1,
                    }).addTo(markerLayer);
                }
            });

            canvasRefLatLng = map.getCenter();
            canvasRefPoint = map.latLngToContainerPoint(canvasRefLatLng);

            updateStats('total', performance.now() - totalStart);

            const paintStart = performance.now();
            requestAnimationFrame(() => {
                updateStats('paint', performance.now() - paintStart);
                if (debounceMs) updateStats('perceived', performance.now() - debounceStart);
            });
        }

        // Map moved
        function moveEnd() {
            updateURL();
            drawVoronoi();
        }
        map.on('moveend', debouncedMoveEnd);

        drawVoronoi();
    </script>
</body>

</html>
